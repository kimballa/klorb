#
# CI workflow: runs the klorb lint, typecheck, and test suites on every push and
# pull request. Mirrors the local dev loop documented in klorb/README.md.

name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up Python
        uses: actions/setup-python@v6.3.0
        with:
          python-version-file: klorb/.python-version

      # Installs the standalone uv binary and caches its resolution/download cache keyed on
      # dev-requirements.txt, so `make cloud_setup` below (which drives uv internally) can
      # restore packages from cache instead of hitting the network on every run.
      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: "klorb/dev-requirements.txt"

      - name: Cloud setup
        run: make cloud_setup

      - name: Lint, typecheck, and test
        working-directory: klorb
        run: make lint typecheck test
